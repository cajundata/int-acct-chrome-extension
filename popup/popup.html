<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Question Extractor</title>
</head>
<body>
  <div class="container">
    <h1>Question Extractor</h1>
    <div id="count">0 questions saved</div>
    <button id="extract-btn">Extract Question</button>
    <button id="copy-html-btn">Save Page HTML</button>
    <div class="btn-row">
      <button id="export-btn" class="btn-secondary">Export JSON</button>
      <button id="clear-btn" class="btn-secondary btn-danger">Clear All</button>
    </div>
    <div id="status"></div>
    <div id="results"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
